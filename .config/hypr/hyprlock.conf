$font = Adwaita Mono
$font_nerd = FiraCode Nerd Font Propo
$fontsizeM = 20
$fontsizeL = 28

$alpha = 0.8

general {
    hide_cursor = false
}

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    monitor =
    color = rgb(000000) # fallback
    blur_passes = 3
    path = $HOME/.cache/current-wallpaper
    immediate_render = true
}

input-field {
    monitor =
    size = 20%, 5%
    outline_thickness = 2
    inner_color = rgb(111111) # no fill

    outer_color = rgb(222222)
    check_color = rgb(00ff99)
    fail_color = rgb(ff6633)

    font_color = rgb(eeeeff)
    fade_on_empty = false
    rounding = 999

    font_family = $font
    placeholder_text = $LAYOUT
    fail_text = $PAMFAIL

    dots_spacing = 0.3

    position = 0, -30%
    halign = center
    valign = center
}

# Greeting
label {
    monitor =
    text = Welcome back, $USER :D
    font_size = $fontsizeL
    font_family = $font
    color = rgb($foreground)

    shadow_passes = 1
    shadow_size = 1
    shadow_color = rgb($background)

    position = 0, -10%
    halign = center
    valign = center
}

# Time
label {
    monitor =
    text = $TIME12
    font_size = $fontsizeM
    font_family = $font
    color = rgba($foreground,$alpha)

    shadow_passes = 1
    shadow_size = 1
    shadow_boost = 1
    shadow_color = rgb($background)

    position = -32, -32
    halign = right
    valign = top
}

# Date
label {
    monitor =
    text = cmd[] date +"%A, %d %B, %Y"
    font_size = $fontsizeM
    font_family = $font
    color = rgba($foreground,$alpha)

    shadow_passes = 1
    shadow_size = 1
    shadow_boost = 1
    shadow_color = rgb($background)

    position = 32, -32
    halign = left
    valign = top
}

# Power Off
label {
    monitor =
    text = 
    font_size = 32
    font_family = $font_nerd
    color = rgba($foreground,$alpha)

    shadow_passes = 1
    shadow_size = 1
    shadow_boost = 1
    shadow_color = rgb($background)

    onclick = systemctl poweroff

    position = -32, 32
    halign = right
    valign = bottom
}

# Restart
label {
    monitor =
    text = 
    font_size = 32
    font_family = $font_nerd
    color = rgba($foreground,$alpha)

    shadow_passes = 1
    shadow_size = 1
    shadow_boost = 1
    shadow_color = rgb($background)

    onclick = systemctl reboot

    position = -96, 32
    halign = right
    valign = bottom
}

# Suspend
label {
    monitor =
    text = 󰤄
    font_size = 32
    font_family = $font_nerd
    color = rgba($foreground,$alpha)

    shadow_passes = 1
    shadow_size = 1
    shadow_boost = 1
    shadow_color = rgb($background)

    onclick = systemctl suspend

    position = -160, 32
    halign = right
    valign = bottom
}
